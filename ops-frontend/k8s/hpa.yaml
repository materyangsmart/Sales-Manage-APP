##############################################################
# ops-frontend HPA（水平自动扩缩容）
##############################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ops-frontend
  namespace: qianzhang-prod
  labels:
    app: ops-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ops-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
##############################################################
# PodDisruptionBudget（保证高可用）
##############################################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ops-frontend
  namespace: qianzhang-prod
  labels:
    app: ops-frontend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ops-frontend
