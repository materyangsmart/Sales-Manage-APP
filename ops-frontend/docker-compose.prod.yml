version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: qianzhang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-qianzhang_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qianzhang_sales}
      MYSQL_USER: ${MYSQL_USER:-qianzhang}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qianzhang_pwd_2026}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=500
      - --innodb-buffer-pool-size=512M
      - --slow-query-log=1
      - --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-qianzhang_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qianzhang-net

  redis:
    image: redis:7-alpine
    container_name: qianzhang-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --requirepass ${REDIS_PASSWORD:-qianzhang_redis_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-qianzhang_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qianzhang-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qianzhang-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-qianzhang}:${MYSQL_PASSWORD:-qianzhang_pwd_2026}@mysql:3306/${MYSQL_DATABASE:-qianzhang_sales}
      REDIS_URL: redis://:${REDIS_PASSWORD:-qianzhang_redis_2026}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      RUN_DB_PUSH: ${RUN_DB_PUSH:-true}
      RUN_SEED: ${RUN_SEED:-false}
      ENABLE_LOCAL_AUTH: ${ENABLE_LOCAL_AUTH:-true}
      VITE_ENABLE_OAUTH: ${VITE_ENABLE_OAUTH:-false}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - qianzhang-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_APP_TITLE: ${VITE_APP_TITLE:-千张销售管理系统}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_APP_ID: ${VITE_APP_ID:-}
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
        VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
        VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
    container_name: qianzhang-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - qianzhang-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  qianzhang-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
